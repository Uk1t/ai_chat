<div id="ai-bot-widget" style="
    position: fixed;
    bottom: 0;
    right: 0;
    width: 400px;
    height: 100vh;
    background: #fff;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    border-radius: 16px;
">

    <div style="background-color: #004225; position: relative; border-radius: 8px 8px 0 0;">
        <div style="height: 54px; display: flex; justify-content: flex-start; align-items: center; gap: 10px; padding: 10px; flex:1;">
            <img src="/static/icons/logo.png" alt="logo" width="30px">
            <span style="color: white; flex:1;">Помощник в НьюКей</span>
        </div>

        <div id="ai-widget-close" style="
            position: absolute;
            top: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        ">×</div>

        <div>
            <img src="/static/icons/ai.png" alt="ai" style="width: 56px;position: relative;z-index: 9;left: 40px;">
        </div>
        <img src="/static/icons/Exclude.png" style="position: absolute; left: 11px; bottom: 0;width: 115px" alt="item">
    </div>

    <div style="padding: 10px; height: 80vh; flex-direction: column; display: flex; border-radius: 8px;">
        <div id="chat-messages" style="flex:1; overflow-y:auto; margin-bottom:10px; border-radius: 8px; padding: 5px; border: #00000026 1px solid;">
            <div style="color: white; max-width: 85%; margin-left: 0px; margin-bottom: 5px;">Бот: Добрый день, я ваш бот-ассистент, я могу подсказать по товару, а также некоторую информацию, которая касается запорной арматуры.</div>
        </div>

        <div style="display:flex;">
            <input id="chat-input" type="text" placeholder="Ваш вопрос..." style="flex:1; border: #00000026 1px solid; padding: 5px;">
            <svg id="chat-send" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"
                 fill="none" style="cursor:pointer;">
                <path d="M6.66406 30.8332V9.1665L32.3691 19.9998L6.66406 30.8332ZM8.33073 28.3332L28.0807 19.9998L8.33073 11.6665V18.1415L16.4074 19.9998L8.33073 21.8598V28.3332Z"
                      fill="#004225"/>
            </svg>
        </div>
    </div>
</div>

<script>
(function() {
    const BASE_URL = "http://72.56.23.114"; // твой сервер

    const chat = document.getElementById("chat-messages");
    const input = document.getElementById("chat-input");
    const btn = document.getElementById("chat-send");
    const closeBtn = document.getElementById("ai-widget-close"); // крестик

    let USER_ID = localStorage.getItem("chat_user_id");
    if (!USER_ID) {
        USER_ID = "guest_" + Math.random().toString(36).substring(2, 10);
        localStorage.setItem("chat_user_id", USER_ID);
    }

    function addMessage(who, text) {
        const div = document.createElement("div");
        div.innerHTML = `<b>${who}:</b> ${text}`;
        div.classList.add(who==="Вы" ? "user" : "bot");
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function loadHistory() {
        try {
            const res = await fetch(`${BASE_URL}/ai/history?user_id=${USER_ID}`);
            const data = await res.json();
            (data.history || []).forEach(msg => addMessage(msg.role==="user"?"Вы":"Бот", msg.content));
        } catch (e) {
            console.error("Не удалось загрузить историю:", e);
        }
    }

    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        addMessage("Вы", text);
        input.value = "";

        const typingDiv = document.createElement("div");
        typingDiv.textContent = "Бот печатает...";
        typingDiv.style.fontStyle = "italic";
        typingDiv.style.color = "white";
        chat.appendChild(typingDiv);
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch(`${BASE_URL}/ai/ask`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user_id: USER_ID, description: text})
            });
            const data = await res.json();
            typingDiv.remove();
            addMessage("Бот", data.answer);
        } catch (e) {
            console.error(e);
            typingDiv.remove();
            addMessage("Бот", "Ошибка при ответе сервера");
        }
    }

    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => { if(e.key === "Enter") sendMessage(); });

    closeBtn.addEventListener("click", () => {
        document.getElementById("ai-bot-iframe").style.display = "none";
    });

    loadHistory();
})();
</script>
